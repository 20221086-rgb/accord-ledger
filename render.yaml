# Render Blueprint — Accord Ledger API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: accord-ledger-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 run:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_DEV_TEST_SIGNATURE
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: accord-ledger-db
          property: connectionString

databases:
  - name: accord-ledger-db
    plan: free
    databaseName: accord_ledger
    user: accord_ledger
